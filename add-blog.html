<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog - Add Post</title>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <h2>My Blog</h2>
        <a href="index.html">Home</a> | 
        <a href="add-blog.html">Add Blog</a>
    </nav>

    <hr>

    <!-- Main Content Area with Form -->
    <main>
        <h1>Create a New Blog Post</h1>
        
        <form>
            <label for="title">Blog Title:</label><br>
            <input type="text" id="title" name="title" placeholder="Enter title here..."><br><br>
            
            <label for="content">Blog Content:</label><br>
            <textarea id="content" name="content" rows="6" placeholder="Write your blog post here..."></textarea><br><br>
            
            <button type="submit">Publish Blog</button>
        </form>
    </main>

    <hr>

    <!-- Footer -->

</body>
</html>
