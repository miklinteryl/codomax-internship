<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog - Add Post</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>My Blog</h2>
        <a href="index.html">Home</a>
        <a href="add-blog.html">Add Blog</a>
    </nav>

    <main>
        <h1>Create a New Blog Post</h1>
        <form id="add-blog-form">
            <label for="title">Blog Title:</label>
            <input type="text" id="title" name="title" placeholder="Enter title here...">
            
            <label for="content">Blog Content:</label>
            <textarea id="content" name="content" rows="6" placeholder="Write your blog post here..."></textarea>
            
            <button type="submit">Publish Blog</button>
        </form>
    </main>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <footer>
        <p>&copy; 2026 Codomax Internship. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
